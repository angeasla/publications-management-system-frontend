server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # -------------------------------------------------------
    # Security Headers
    # -------------------------------------------------------
    # Prevent the page from being embedded in an iframe (clickjacking)
    add_header X-Frame-Options "DENY" always;
    # Prevent MIME-type sniffing
    add_header X-Content-Type-Options "nosniff" always;
    # Legacy XSS filter for older browsers
    add_header X-XSS-Protection "1; mode=block" always;
    # Control how much referrer info is sent
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # Restrict browser features (camera, mic, geolocation not needed)
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    # Content Security Policy: allow only same-origin, Google Fonts, and own API
    # Adjust script-src if you add external CDN scripts later
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none';" always;
    # NOTE: Add the following header ONLY after you enable HTTPS (TLS):
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # -------------------------------------------------------
    # Gzip Compression
    # -------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # -------------------------------------------------------
    # SPA Routing — Angular handles its own routing
    # -------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }

    # -------------------------------------------------------
    # Static Asset Caching
    # Angular generates content-hashed filenames (e.g., main.abc123.js)
    # so long-lived cache is safe and correct.
    # -------------------------------------------------------
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        # Re-add security headers (add_header is not inherited in nested locations)
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
    }

    # -------------------------------------------------------
    # index.html: never cache (always fetch fresh)
    # -------------------------------------------------------
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # -------------------------------------------------------
    # API Proxy — forward /api/* to Spring Boot backend
    # -------------------------------------------------------
    location /api/ {
        proxy_pass http://backend:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Remove server version from proxied responses
        proxy_hide_header X-Powered-By;
        proxy_hide_header Server;
    }

    # -------------------------------------------------------
    # Hide nginx version in error pages
    # -------------------------------------------------------
    server_tokens off;
}
