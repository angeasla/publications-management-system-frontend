<div class="login-container">
  <div class="glass-card login-card animate-fade-in">
    <div class="login-header">
      <div class="logo-circle">Κ</div>
      <h1>{{ 'auth.login.title' | translate }}</h1>
      <p>{{ 'auth.login.subtitle' | translate }}</p>
    </div>

    <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
      
      <!-- Username -->
      <div class="form-group">
        <label class="form-label" style="color: var(--text-main);">{{ 'auth.login.username' | translate }}</label>
        <div style="position: relative;">
          <input 
            type="text" 
            [(ngModel)]="username" 
            name="username" 
            required 
            class="form-input" 
            [placeholder]="'auth.login.usernamePlaceholder' | translate"
            style="padding-left: 2.5rem;"
          />
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" style="width: 18px; height: 18px; position: absolute; left: 0.85rem; top: 50%; transform: translateY(-50%); color: var(--text-muted)">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z" />
          </svg>
        </div>
      </div>

      <!-- Password -->
      <div class="form-group" style="margin-bottom: 1.5rem;">
        <label class="form-label" style="color: var(--text-main);">{{ 'auth.login.password' | translate }}</label>
        <div style="position: relative;">
          <input 
            type="password" 
            [(ngModel)]="password" 
            name="password" 
            required 
            class="form-input" 
            placeholder="••••••••"
            style="padding-left: 2.5rem;"
          />
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" style="width: 18px; height: 18px; position: absolute; left: 0.85rem; top: 50%; transform: translateY(-50%); color: var(--text-muted)">
            <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 1 0-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 0 0 2.25-2.25v-6.75a2.25 2.25 0 0 0-2.25-2.25H6.75a2.25 2.25 0 0 0-2.25 2.25v6.75a2.25 2.25 0 0 0 2.25 2.25Z" />
          </svg>
        </div>
      </div>

      <!-- Error Message -->
      @if (errorMessage) {
        <div class="error-box">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" style="width: 18px; height: 18px; flex-shrink: 0;">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 1 1-18 0 9 9 0 0 1 18 0Zm-9 3.75h.008v.008H12v-.008Z" />
          </svg>
          <span>{{ errorMessage }}</span>
        </div>
      }

      <!-- Submit Button -->
      <button type="submit" class="btn btn-primary login-btn" [disabled]="!loginForm.form.valid || isLoading">
        @if (isLoading) {
          {{ 'auth.login.submitLoading' | translate }}
        } @else {
          {{ 'auth.login.submit' | translate }}
        }
      </button>

    </form>
  </div>
</div>
