<div class="page-header">
  <div>
    <h1 class="page-title">{{ 'auth.changePassword.title' | translate }}</h1>
    <p style="color: var(--text-muted)">{{ 'auth.changePassword.subtitle' | translate }}</p>
  </div>
  <div>
    <a routerLink="/dashboard" class="btn btn-secondary">{{ 'common.actions.cancel' | translate }}</a>
  </div>
</div>

<div class="glass-card" style="max-width: 500px; margin: 0 auto;">
  <form (ngSubmit)="onSubmit()" #passwordForm="ngForm">
    
    <!-- Success Alert -->
    @if (successMessage) {
      <div class="success-box" style="margin-bottom: 1.25rem;">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" style="width: 18px; height: 18px; flex-shrink: 0;">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
        </svg>
        <span>{{ successMessage }}</span>
      </div>
    }

    <!-- Error Alert -->
    @if (errorMessage) {
      <div class="error-box" style="margin-bottom: 1.25rem;">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" style="width: 18px; height: 18px; flex-shrink: 0;">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 1 1-18 0 9 9 0 0 1 18 0Zm-9 3.75h.008v.008H12v-.008Z" />
        </svg>
        <span>{{ errorMessage }}</span>
      </div>
    }

    <!-- Old Password -->
    <div class="form-group">
      <label class="form-label">{{ 'auth.changePassword.oldPassword' | translate }} <span style="color: var(--danger)">*</span></label>
      <input 
        type="password" 
        [(ngModel)]="oldPassword" 
        name="oldPassword" 
        required 
        class="form-input" 
        [placeholder]="'auth.changePassword.oldPasswordPlaceholder' | translate"
      />
    </div>

    <!-- New Password -->
    <div class="form-group">
      <label class="form-label">{{ 'auth.changePassword.newPassword' | translate }} <span style="color: var(--danger)">*</span></label>
      <input 
        type="password" 
        [(ngModel)]="newPassword" 
        name="newPassword" 
        required 
        class="form-input" 
        [placeholder]="'auth.changePassword.newPasswordPlaceholder' | translate"
      />
    </div>

    <!-- Confirm New Password -->
    <div class="form-group">
      <label class="form-label">{{ 'auth.changePassword.confirmPassword' | translate }} <span style="color: var(--danger)">*</span></label>
      <input 
        type="password" 
        [(ngModel)]="confirmPassword" 
        name="confirmPassword" 
        required 
        class="form-input" 
        [placeholder]="'auth.changePassword.confirmPasswordPlaceholder' | translate"
      />
    </div>

    <div style="display: flex; justify-content: flex-end; gap: 1rem; margin-top: 2rem;">
      <a routerLink="/dashboard" class="btn btn-secondary">{{ 'common.actions.cancel' | translate }}</a>
      <button type="submit" class="btn btn-primary" [disabled]="!passwordForm.form.valid || isLoading">
        @if (isLoading) {
          {{ 'auth.changePassword.submitLoading' | translate }}
        } @else {
          {{ 'auth.changePassword.submit' | translate }}
        }
      </button>
    </div>

  </form>
</div>
